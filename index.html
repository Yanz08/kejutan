<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Kamu ❤️</title>

<!-- MODE APP -->
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
*{box-sizing:border-box;}

body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 overflow:hidden;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
 padding:15px;
}

/* BACKGROUND */
body::before{
 content:"";
 position:absolute;
 width:100%; height:100%;
 background:url('bg.jpg') center/cover no-repeat;
 filter:brightness(0.6);
 z-index:-1;
 transition:1.5s;
}
.dark-mode::before{
 background:url('night.jpg') center/cover no-repeat;
}

/* CARD */
.card{
 background:rgba(0,0,0,0.5);
 padding:20px;
 border-radius:20px;
 text-align:center;
 width:100%;
 max-width:350px;
 backdrop-filter:blur(10px);
}

/* INPUT */
input,button{
 padding:12px;
 margin:8px;
 border-radius:10px;
 border:none;
 width:100%;
 font-size:16px;
}

button{
 background:#a8e063;
 cursor:pointer;
}

/* FOTO CINEMATIC */
.photo-wrapper{
 position:absolute;
 bottom:0;
 width:100%;
 overflow:hidden;
 opacity:0;
 transition:1.5s;
}
.photo-wrapper.show{opacity:1;}

.photo-track{
 display:flex;
 width:max-content;
 animation:scrollLoop 35s linear infinite;
}

.photo-track img{
 width:140px;
 height:100px;
 margin:6px;
 border-radius:12px;
 object-fit:cover;
}

@keyframes scrollLoop{
 from{transform:translateX(0);}
 to{transform:translateX(-50%);}
}

/* GLOW */
.glow{
 text-shadow:
 0 0 5px #fff,
 0 0 10px #ff4d6d,
 0 0 20px #ff4d6d;
}

/* STAR */
.star{
 position:absolute;
 width:2px;height:2px;
 background:white;
 animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
 from{opacity:0.2;}
 to{opacity:1;}
}

/* SHOOTING STAR */
.shoot{
 position:absolute;
 width:2px;height:60px;
 background:linear-gradient(white,transparent);
 transform:rotate(45deg);
 animation:shoot 1s linear;
}
@keyframes shoot{
 to{transform:translate(200px,200px) rotate(45deg); opacity:0;}
}

/* FIREWORK */
.rocket{
 position:absolute;
 width:3px;height:10px;
 background:white;
 animation:rocketUp 0.7s linear forwards;
}
@keyframes rocketUp{
 to{transform:translateY(-150px); opacity:0;}
}

.particle{
 position:absolute;
 width:3px;height:3px;
 border-radius:50%;
 animation:explode 1.2s ease-out forwards;
}
@keyframes explode{
 to{transform:translate(var(--x),var(--y)); opacity:0;}
}

/* FLASH */
.flash-strong{
 position:fixed;
 width:100%;height:100%;
 background:white;
 pointer-events:none;
}

/* HIDDEN */
.hidden{display:none;}

#final{
 font-size:26px;
 font-weight:bold;
}

/* PLAYFUL */
.pulse{animation:pulse 1s infinite;}
@keyframes pulse{
 50%{transform:scale(1.05);}
}

/* LOVE BESAR */
.big-love{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%) scale(0.5);
 font-size:80px;
 opacity:0;
 animation:loveAppear 1.5s ease forwards;
 z-index:999;
}

@keyframes loveAppear{
 0%{opacity:0; transform:translate(-50%,-50%) scale(0.5);}
 100%{opacity:1; transform:translate(-50%,-50%) scale(1);}
}

/* PARTICLE LOVE */
.love-particle{
 position:fixed;
 font-size:14px;
 opacity:1;
 pointer-events:none;
}

</style>
</head>

<body onclick="openFullscreen()">

<!-- AUDIO -->
<audio id="music" loop>
<source src="music.mp3">
</audio>

<audio id="cameraSound">
<source src="camera.mp3">
</audio>

<!-- FOTO -->
<div class="photo-wrapper hidden" id="photoWrapper">
<div class="photo-track">
<img src="foto1.jpg"><img src="foto2.jpg"><img src="foto3.jpg"><img src="foto4.jpg"><img src="foto5.jpg">
<img src="foto1.jpg"><img src="foto2.jpg"><img src="foto3.jpg"><img src="foto4.jpg"><img src="foto5.jpg">
</div>
</div>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Masukin dulu ya 😊</h2>
<input id="name" placeholder="Nama kamu">
<input id="key" type="password" placeholder="Kata kunci">
<div id="error"></div>
<button onclick="login()">Masuk 💌</button>
</div>

<!-- CEK DATE -->
<div class="card hidden" id="dateBox">
<h2>Hari ini tanggal berapa? 📅</h2>

<input id="tanggal" type="number" placeholder="Tanggal (1-31)">
<input id="bulan" type="number" placeholder="Bulan (1-12)">
<input id="tahun" type="number" placeholder="Tahun (contoh: 2026)">

<div id="dateError" style="color:#ff6b6b;font-size:14px;"></div>

<button onclick="submitDate()">Lanjut 💖</button>
</div>

<!-- CONTENT -->
<div class="card hidden" id="contentBox">
<h2 id="greet"></h2>
<p id="text"></p>
<button onclick="next()">Lanjut 💖</button>
</div>

<!-- QUESTION -->
<div class="card hidden" id="questionBox">
<h2>Apakah kamu bahagia hari ini? 😊</h2>
<button onclick="answer()">Bahagia 😏</button>
<button class="pulse" onclick="answer()">Bahagia Banget 💖</button>
</div>

<!-- POSE -->
<div class="card hidden" id="poseBox">
<h2 id="countdownText"></h2>
</div>

<!-- COMPLIMENT -->
<div class="card hidden" id="complimentBox">
<h2 class="glow">Kamu Sangat Cantik Hari Ini 💖</h2>
</div>

<!-- FINAL -->
<div class="card hidden" id="finalBox">
<div id="final"></div>
</div>

<script>
const $=id=>document.getElementById(id);

/* FULLSCREEN */
function openFullscreen(){
 let el=document.documentElement;
 if(el.requestFullscreen){el.requestFullscreen();}
 else if(el.webkitRequestFullscreen){el.webkitRequestFullscreen();}
}

/* DATA */
let userName="",i=0,char=0;

const messages=[
"Wihh.. Ternyata Hari ini Tanggal 16 April 2026 yaa",
"Selamat ulang tahun ya 💖",
"Aku bersyukur bisa kenal kamu 🌿",
"Kamu itu spesial banget buat aku",
"Dan hari ini aku cuma mau bilang sesuatu..."
];

/* LOGIN */
function login(){
 openFullscreen();

 let name=$("name").value.trim();
 let key=$("key").value;

 if(!name||key!=="cintaaku"){
  $("error").innerText="Salah 😜";
  return;
 }

 userName=name;

 $("loginBox").classList.add("hidden");
$("dateBox").classList.remove("hidden");

 let pw=$("photoWrapper");
 pw.classList.remove("hidden");
 setTimeout(()=>pw.classList.add("show"),100);

 $("greet").innerText="Hai "+name+" 💚";
 $("music").play().catch(()=>{});

 type();
}

// ==========================================

const specialDay = 16;   // ganti sesuai tanggal dia
const specialMonth = 4;  // ganti sesuai bulan dia

function submitDate(){
 let t = parseInt($("tanggal").value);
 let b = parseInt($("bulan").value);
 let th = $("tahun").value;

 if(!t || !b || !th){
  $("dateError").innerText="Isi dulu dong 😜";
  return;
 }

 if(t < 1 || t > 31 || b < 1 || b > 12){
  $("dateError").innerText="Hmm... masa gitu sih 🤨";
  return;
 }

 /* 🎯 LOGIC ROMANTIS */

 // 💖 BENAR (ULTIMATE MOMENT)
 if(t === specialDay && b === specialMonth){

  $("dateError").innerText="Iya... hari spesial kamu 💖";

  romanticLoveAnimation(); // efek tambahan

  setTimeout(()=>{
   lanjutMasuk();
  },2000);

  return;
 }

 // 😏 HAMPIR BENAR (kode lucu)
 if(Math.abs(t - specialDay) <= 1 && b === specialMonth){
  $("dateError").innerText="Dikit lagi... masa lupa sih 😏";
  return;
 }

 // 😜 SALAH TOTAL (playful)
 const teasing = [
  "Yakin itu tanggalnya? 🤔",
  "Aku rasa kamu tau jawabannya 😏",
  "Coba inget lagi deh 💭",
  "Hari penting loh itu 😌",
  "Masa lupa hari kamu sendiri 😜"
 ];

 $("dateError").innerText = teasing[Math.floor(Math.random()*teasing.length)];
}

function lanjutMasuk(){
 $("dateBox").classList.add("hidden");
 $("contentBox").classList.remove("hidden");

 let pw=$("photoWrapper");
 pw.classList.remove("hidden");
 setTimeout(()=>pw.classList.add("show"),100);

 $("greet").innerText="Hai "+userName+" 💚";
 $("music").play().catch(()=>{});

 type();
}

function romanticLoveAnimation(){

 // 💖 LOVE BESAR
 let bigLove = document.createElement("div");
 bigLove.className = "big-love";
 bigLove.innerHTML = "💖";
 document.body.appendChild(bigLove);

 // ✨ PARTICLE KECIL
 let centerX = window.innerWidth/2;
 let centerY = window.innerHeight/2;

 for(let i=0;i<40;i++){
  let p = document.createElement("div");
  p.className = "love-particle";
  p.innerHTML = "💗";

  p.style.left = centerX + "px";
  p.style.top = centerY + "px";

  let angle = Math.random()*2*Math.PI;
  let distance = 80 + Math.random()*80;

  let x = Math.cos(angle)*distance;
  let y = Math.sin(angle)*distance;

  p.animate([
   {transform:"translate(0,0)", opacity:1},
   {transform:`translate(${x}px,${y}px)`, opacity:0}
  ],{
   duration:1500,
   easing:"ease-out"
  });

  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1500);
 }

 // hapus love besar setelah beberapa detik
 setTimeout(()=>{
  bigLove.remove();
 },1800);
}

// ==================================

/* TYPE */
function type(){
 if(char<messages[i].length){
  $("text").innerHTML+=messages[i][char++];
  setTimeout(type,40);
 }
}

/* NEXT */
function next(){
 i++;
 if(i<messages.length){
  char=0;$("text").innerHTML="";
  type();
 }else{
  $("contentBox").classList.add("hidden");
  $("questionBox").classList.remove("hidden");
 }
}

/* ANSWER */
function answer(){
 $("questionBox").classList.add("hidden");
 startPose();
}

/* POSE */
function startPose(){
 $("poseBox").classList.remove("hidden");
 let c=3;

 function count(){
  if(c>0){
   $("countdownText").innerText="Pose dulu ya "+c+" 📸";
   c--; setTimeout(count,1000);
  }else takePhoto();
 }
 count();
}

/* CAMERA */
function takePhoto(){
 $("cameraSound").play().catch(()=>{});

 let flash=document.createElement("div");
 flash.className="flash-strong";
 document.body.appendChild(flash);

 flash.animate([{opacity:1},{opacity:0}],{duration:600});
 setTimeout(()=>flash.remove(),600);

 $("poseBox").classList.add("hidden");

 setTimeout(()=>{
  $("complimentBox").classList.remove("hidden");

  setTimeout(()=>{
   $("complimentBox").classList.add("hidden");
   showFinal();
  },2000);

 },300);
}

/* STAR */
function createStars(){
 for(let i=0;i<60;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
 }
}

/* SHOOT */
function shootingStar(){
 setInterval(()=>{
  let s=document.createElement("div");
  s.className="shoot";
  s.style.left=Math.random()*80+"vw";
  s.style.top=Math.random()*40+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
 },2500);
}

/* FIREWORK */
function firework(){
 setInterval(()=>{
  let x=Math.random()*innerWidth;
  let y=innerHeight;

  let r=document.createElement("div");
  r.className="rocket";
  r.style.left=x+"px"; r.style.top=y+"px";
  document.body.appendChild(r);

  setTimeout(()=>{
   r.remove();
   for(let i=0;i<50;i++){
    let p=document.createElement("div");
    p.className="particle";
    let a=Math.random()*2*Math.PI;
    let d=Math.random()*120;
    p.style.setProperty("--x",(Math.cos(a)*d)+"px");
    p.style.setProperty("--y",(Math.sin(a)*d)+"px");
    p.style.left=x+"px"; p.style.top=(y-150)+"px";
    p.style.background=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0"][Math.floor(Math.random()*4)];
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1200);
   }
  },700);

 },1000);
}

/* FINAL */
function showFinal(){
 $("finalBox").classList.remove("hidden");
 document.body.classList.add("dark-mode");

 createStars();
 shootingStar();

 let text="HAPPY BIRTHDAY, "+userName+" 🎉💖";
 let j=0;

 function typing(){
  if(j<text.length){
   $("final").innerHTML='<span class="glow">'+text.slice(0,j+1)+'</span>';
   j++; setTimeout(typing,120);
  }else firework();
 }
 typing();
}
</script>

</body>
</html>
